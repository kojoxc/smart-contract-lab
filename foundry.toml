[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib", "node_modules"]

solc = "0.8.20"
auto_detect_solc = false

optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "paris"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
